<div class="login-container">
    <mat-card class="login-card">
        <mat-card-header>
            <mat-card-title>Iniciar Sesión</mat-card-title>
            <mat-card-subtitle>Ingresa tus credenciales para acceder</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

                <!-- Input de Correo -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Correo electrónico</mat-label>
                    <input matInput formControlName="email" type="email" placeholder="ejemplo@correo.com">
                    <mat-icon matSuffix>email</mat-icon>
                    <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
                        El correo es obligatorio
                    </mat-error>
                    <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
                        Ingresa un correo válido
                    </mat-error>
                </mat-form-field>

                <!-- Input de Contraseña -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Contraseña</mat-label>
                    <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
                    <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword"
                        [attr.aria-label]="'Ocultar contraseña'" [attr.aria-pressed]="hidePassword">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
                        La contraseña es obligatoria
                    </mat-error>
                </mat-form-field>

                <!-- Botón de Enviar -->
                <button mat-raised-button color="primary" type="submit" class="full-width login-btn"
                    [disabled]="loginForm.invalid || isLoading">
                    <span *ngIf="!isLoading">Ingresar</span>
                    <span *ngIf="isLoading">Iniciando sesión...</span>
                </button>
                <span>¿No tienes una cuenta? <a href="/register">Registrarse</a></span>
            </form>
        </mat-card-content>
    </mat-card>
</div>
