<div class="register-container">
    <mat-card class="register-card">
        <mat-card-header>
            <mat-card-title>Registrarse</mat-card-title>
            <mat-card-subtitle>Crea una cuenta nueva para acceder</mat-card-subtitle>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

                <!-- Input de Correo -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Correo electrónico</mat-label>
                    <input matInput formControlName="email" type="email" placeholder="ejemplo@correo.com">
                    <mat-icon matSuffix>email</mat-icon>
                    <mat-error *ngIf="registerForm.get('email')?.hasError('required')">
                        El correo es obligatorio
                    </mat-error>
                    <mat-error *ngIf="registerForm.get('email')?.hasError('email')">
                        Ingresa un correo válido
                    </mat-error>
                </mat-form-field>

                <!-- Input de Contraseña -->
                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Contraseña</mat-label>
                    <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
                    <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword"
                        [attr.aria-label]="'Ocultar contraseña'" [attr.aria-pressed]="hidePassword">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-error *ngIf="registerForm.get('password')?.hasError('required')">
                        La contraseña es obligatoria
                    </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline" class="full-width">
                    <mat-label>Confirmar contraseña</mat-label>
                    <input matInput formControlName="confirmPassword" [type]="hidePassword ? 'password' : 'text'">
                    <button type="button" mat-icon-button matSuffix (click)="hidePassword = !hidePassword"
                        [attr.aria-label]="'Ocultar contraseña'" [attr.aria-pressed]="hidePassword">
                        <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
                    </button>
                    <mat-error *ngIf="registerForm.get('confirmPassword')?.hasError('required')">
                        La confirmación es obligatoria
                    </mat-error>
                    <mat-error
                        *ngIf="registerForm.get('confirmPassword')?.hasError('passwordMismatch') && !registerForm.get('confirmPassword')?.hasError('required')">
                        Las contraseñas no coinciden
                    </mat-error>
                </mat-form-field>

                <!-- Botón de Enviar -->
                <button mat-raised-button color="primary" type="submit" class="full-width register-btn"
                    [disabled]="registerForm.invalid || isLoading">
                    <span *ngIf="!isLoading">Crear cuenta</span>
                    <span *ngIf="isLoading">Registrando...</span>
                </button>

            </form>
            <div class="text-center mt-3">
                <span>¿Ya tienes una cuenta? </span> <a href="/login">Inicia sesión</a>
            </div>
        </mat-card-content>
    </mat-card>
</div>
